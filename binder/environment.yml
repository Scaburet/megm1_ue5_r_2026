name: megm1_ue5_r_2026
# d'après le repo https://github.com/CVandiedonck/megm1_ue5_r.git
# mis à jour pour prendre en compte la maj importante de Plasma, printemps 2026

# channels priority
# see https://bioconda.github.io/
# conda-forge has highest prioriy
channels:
  - conda-forge
  - bioconda
  - nodefaults
  
dependencies:
  # Jupyter dependencies
  - jupyterhub>=4.1.6,<5
  - jupyterlab>=4.6,<5
  - notebook>=7.4,<8
  - jupyter-resource-usage
  #- jupyterlab-topbar
  - jupyterlab-topbar-text
  #- jupyterlab-system-monitor  # cause une erreur dans la création env sur uracile
  - nodejs>=20

  # Jupyter archive
  # https://github.com/jupyterlab-contrib/jupyter-archive
  - jupyter-archive
  # https://github.com/jupyterlab/jupyterlab-git
  - jupyterlab-git
  # JupyterLab Variable inspector
  # https://github.com/lckr/jupyterlab-variableInspector
  - jupyterlab-variableinspector
  - nbresuse
  - libgomp

  # Build tools required for Ubuntu 24.04
  - gxx_linux-64
  - gcc_linux-64
  - gfortran_linux-64

  # Bash environment
  - bash_kernel
 
  # R environment (version for Ubuntu 24.04)
  - r-irkernel>1.3
  - r-base>=4.5
  - r-tidyverse
  - r-essentials
  - r-repr
  - r-rcpp
  - r-rcurl

 # R packages
  - r-dt
  - r-Matrix
  - r-lattice
  - r-factominer
  - r-factoextra
  - r-fdrtool
  - r-rpart
  - r-markdown
  - r-RSQLite
  - r-gplots
  - r-ggplot2
  - r-writexl
  - r-readxl
  - r-rcolorbrewer
  - r-igraph
  - r-ggtangle
  - r-pheatmap
  - r-statmod
  - r-shape
  - r-diagram
  - r-fastmap
  #- r-enrichplot

# Python environment
  - python>=3.10
  - pip
  - ipywidgets>=8,<9
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - biopython
  - pip:
    - watermark
